<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Encomendas — Padaria da Tia Iria</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#EFE4CD;--surface:#FBF6EE;--surface-2:#F3E8D2;--ink:#3F2B18;--soft:#7A6A55;--line:#E0D2B4;--crust:#56391F;--honey:#BF853A;--green:#4A8A52;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);padding-bottom:120px}
h1,h2{font-family:'Baloo 2',cursive}
.brand{font-family:Georgia,'Times New Roman',serif;letter-spacing:.01em}
.hero{background:linear-gradient(135deg,#BF853A,#56391F);color:#fff;padding:30px 20px;text-align:center}
.hero .wheat{width:34px;height:auto;color:#fff;fill:currentColor;display:block;margin:0 auto 6px;opacity:.95}
.hero .brand{font-size:2.2rem;font-weight:700;line-height:1.05}
.hero .brand .wm-top{display:block;font-size:.8rem;letter-spacing:.32em;opacity:.82;font-weight:400;padding-left:.32em;margin-bottom:2px}
.hero .brand span{opacity:.9}
.hero p{opacity:.9;margin-top:4px}
.wrap{max-width:560px;margin:0 auto;padding:18px}
.sec{font-family:'Baloo 2';font-weight:700;font-size:1.2rem;margin:18px 0 10px}
.prod{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px;display:flex;align-items:center;gap:12px;margin-bottom:10px;box-shadow:0 2px 10px rgba(80,50,20,.06)}
.prod .thumb{width:54px;height:54px;border-radius:12px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;font-size:1.6rem;overflow:hidden;flex-shrink:0}
.prod .thumb img{width:100%;height:100%;object-fit:cover}
.prod .grow{flex:1;min-width:0}
.prod .grow b{display:block}
.prod .grow .pr{color:var(--honey);font-weight:700}
.prod .grow .ds{font-size:.82rem;color:var(--soft)}
.qty{display:flex;align-items:center;gap:10px}
.qty button{width:36px;height:36px;border-radius:10px;border:none;background:var(--surface-2);font-size:1.2rem;font-weight:800;color:var(--ink);cursor:pointer}
.qty b{min-width:20px;text-align:center}
.field{margin-bottom:12px}
.field label{display:block;font-size:.82rem;font-weight:600;color:var(--soft);margin-bottom:5px}
.field input,.field textarea{width:100%;padding:13px;border:1.5px solid var(--line);border-radius:12px;font-size:16px;background:#fff;color:var(--ink)}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--honey)}
.card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:0 2px 10px rgba(80,50,20,.06)}
.bar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--line);padding:14px 18px calc(14px + env(safe-area-inset-bottom));box-shadow:0 -4px 16px rgba(0,0,0,.06)}
.bar .inner{max-width:560px;margin:0 auto;display:flex;align-items:center;gap:12px}
.btn{flex:1;padding:15px;border:none;border-radius:14px;background:var(--honey);color:#fff;font-family:'Baloo 2';font-weight:700;font-size:1.05rem;cursor:pointer}
.btn.green{background:var(--green)}
.btn:disabled{opacity:.5}
.tot{font-family:'Baloo 2';font-weight:700;font-size:1.3rem}
.msg{text-align:center;padding:50px 20px}
.msg .big{font-size:3.5rem;margin-bottom:10px}
.empty{text-align:center;color:var(--soft);padding:30px}
.rate{margin-top:7px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.rate .avg{font-size:.78rem;color:var(--soft)}
.rate .done{font-size:.8rem;color:var(--green);font-weight:700}
.stars{font-size:1.3rem;letter-spacing:2px;color:#E0A21E;cursor:pointer;user-select:none}
.stars span{padding:0 1px}
.rovl{position:fixed;inset:0;background:rgba(30,20,10,.5);z-index:80;display:flex;align-items:flex-end;justify-content:center}
.rmod{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:22px 18px calc(22px + env(safe-area-inset-bottom))}
.rmod h3{font-family:'Baloo 2';font-size:1.25rem;margin-bottom:6px}
.rmod .bigstars{font-size:2.4rem;letter-spacing:6px;color:#E0A21E;cursor:pointer;text-align:center;margin:10px 0;user-select:none}
@media(min-width:560px){.rovl{align-items:center}.rmod{border-radius:20px;margin:16px}}
</style>
</head>
<body>
<div class="hero"><svg class="wheat" viewBox="0 0 40 96" aria-hidden="true"><rect x="18.3" y="24" width="3.4" height="60" rx="1.7"/><ellipse cx="20" cy="14" rx="6" ry="14"/><g transform="translate(20,32) rotate(-40)"><ellipse cx="0" cy="-13" rx="5.4" ry="12.5"/></g><g transform="translate(20,32) rotate(40)"><ellipse cx="0" cy="-13" rx="5.4" ry="12.5"/></g><g transform="translate(20,50) rotate(-40)"><ellipse cx="0" cy="-13" rx="5.4" ry="12.5"/></g><g transform="translate(20,50) rotate(40)"><ellipse cx="0" cy="-13" rx="5.4" ry="12.5"/></g><g transform="translate(20,68) rotate(-40)"><ellipse cx="0" cy="-13" rx="5.4" ry="12.5"/></g><g transform="translate(20,68) rotate(40)"><ellipse cx="0" cy="-13" rx="5.4" ry="12.5"/></g></svg><div class="brand" id="lojaNome"><span class="wm-top">PADARIA DA</span>Tia <span>Iria</span></div><p id="lojaInfo">Faça sua encomenda 🥖</p></div>
<div class="wrap" id="wrap"><div class="empty">Carregando…</div></div>

<div class="bar" id="bar" style="display:none">
  <div class="inner">
    <div><div style="font-size:.75rem;color:var(--soft)">Total</div><div class="tot" id="barTot">R$ 0,00</div></div>
    <button class="btn" id="btnNext" disabled onclick="irCheckout()">Continuar</button>
  </div>
</div>

<script>
/* Mesmas chaves do sistema (anon key é pública por design) */
const SUPABASE_URL = "https://mqykepmbbxvdmqnynwvo.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_ufAQlUsasNewNDQMKev-bQ_auLNfcEK";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const money=n=>"R$ "+(Number(n)||0).toLocaleString("pt-BR",{minimumFractionDigits:2});
const params=new URLSearchParams(location.search);
const slug=params.get("loja");
let LOJA=null, PRODUTOS=[], CART={}, AVS=[], AVG={}, RATED={};

async function init(){
  if(!slug){document.getElementById("wrap").innerHTML='<div class="empty">Link inválido. Peça o link correto para a loja.</div>';return;}
  const {data:loja}=await sb.from("empresa").select("*").eq("slug",slug).maybeSingle();
  if(!loja){document.getElementById("wrap").innerHTML='<div class="empty">Loja não encontrada.</div>';return;}
  LOJA=loja;
  document.getElementById("lojaNome").innerHTML=(loja.nome||"Padaria da Tia Iria").replace(/Iria(?![\s\S]*Iria)/i,'<span>Iria</span>');
  document.getElementById("lojaInfo").textContent=loja.aceita_encomendas===false?"Encomendas temporariamente fechadas":(loja.endereco||"Faça sua encomenda 🥖");
  if(loja.aceita_encomendas===false){document.getElementById("wrap").innerHTML='<div class="empty">No momento não estamos recebendo encomendas. Volte em breve! 🙏</div>';return;}
  const {data:prods}=await sb.from("produtos").select("*").eq("owner_id",loja.owner_id).eq("ativo",true);
  PRODUTOS=prods||[];
  const {data:avs}=await sb.from("avaliacoes").select("*").eq("owner_id",loja.owner_id);
  AVS=avs||[]; AVG=computeAvg(AVS); RATED=loadRated();
  render();
}
function computeAvg(list){const m={};list.forEach(a=>{const k=a.produto_id;m[k]=m[k]||{soma:0,n:0};m[k].soma+=Number(a.nota);m[k].n++;});Object.keys(m).forEach(k=>m[k].media=m[k].soma/m[k].n);return m;}
function loadRated(){try{return JSON.parse(localStorage.getItem("padariaTiaIria_rated_"+slug))||{}}catch(e){return {}}}
function saveRated(){try{localStorage.setItem("padariaTiaIria_rated_"+slug,JSON.stringify(RATED))}catch(e){}}
function starsStr(v){const f=Math.round(v);return "★★★★★".slice(0,f)+"☆☆☆☆☆".slice(0,5-f);}
function render(){
  const w=document.getElementById("wrap");
  if(!PRODUTOS.length){w.innerHTML='<div class="empty">Nenhum produto disponível no momento.</div>';return;}
  w.innerHTML=`<div class="sec">Escolha os produtos</div>`+PRODUTOS.map(p=>{
    const q=CART[p.id]?.qtd||0; const a=AVG[p.id]; const mine=RATED[p.id];
    return `<div class="prod">
      <div class="thumb">${p.foto_url?`<img src="${p.foto_url}">`:"🥖"}</div>
      <div class="grow"><b>${p.nome}</b><div class="pr">${money(p.preco_venda)}</div>${p.descricao?`<div class="ds">${p.descricao}</div>`:""}
        <div class="rate">
          ${a?`<span class="avg">${starsStr(a.media)} ${a.media.toFixed(1)} (${a.n})</span>`:`<span class="avg">Sem avaliações ainda</span>`}
          ${mine?`<span class="done">✓ você deu ${mine}★</span>`:`<span class="stars" id="st_${p.id}">${"☆".repeat(5).split("").map((s,i)=>`<span onclick="abrirAval('${p.id}',${i+1})">☆</span>`).join("")}</span>`}
        </div>
      </div>
      <div class="qty"><button onclick="chg('${p.id}',-1)">−</button><b id="q_${p.id}">${q}</b><button onclick="chg('${p.id}',1)">+</button></div>
    </div>`}).join("");
  document.getElementById("bar").style.display="block";
  const btn=document.getElementById("btnNext");
  btn.textContent="Continuar";btn.className="btn";btn.onclick=irCheckout;
  updateBar();
}
function chg(id,d){
  const p=PRODUTOS.find(x=>x.id===id);
  const cur=CART[id]?.qtd||0;const n=Math.max(0,cur+d);
  if(n===0)delete CART[id];else CART[id]={qtd:n,nome:p.nome,preco:Number(p.preco_venda)};
  document.getElementById("q_"+id).textContent=n;
  updateBar();
}
function total(){return Object.values(CART).reduce((a,c)=>a+c.preco*c.qtd,0);}
function updateBar(){
  document.getElementById("barTot").textContent=money(total());
  document.getElementById("btnNext").disabled=Object.keys(CART).length===0;
}
function irCheckout(){
  const w=document.getElementById("wrap");
  w.innerHTML=`<div class="sec">Seu pedido</div>
   <div class="card" style="margin-bottom:16px">${Object.values(CART).map(c=>`<div style="display:flex;justify-content:space-between;padding:6px 0"><span>${c.qtd}x ${c.nome}</span><b>${money(c.preco*c.qtd)}</b></div>`).join("")}
     <div style="display:flex;justify-content:space-between;border-top:1px solid var(--line);margin-top:8px;padding-top:8px"><b>Total</b><b>${money(total())}</b></div></div>
   <div class="sec">Seus dados</div>
   <div class="card">
     <div class="field"><label>Nome *</label><input id="fNome"></div>
     <div class="field"><label>Telefone</label><input id="fTel" inputmode="tel"></div>
     <div class="field"><label>WhatsApp</label><input id="fZap" inputmode="tel" placeholder="(41) 99999-9999"></div>
     <div class="field"><label>Endereço de entrega</label><input id="fEnd"></div>
     <div class="field"><label>Data desejada</label><input id="fData" type="date"></div>
     <div class="field"><label>Observações</label><textarea id="fObs" placeholder="Sem cebola, entregar à tarde..."></textarea></div>
   </div>`;
  document.getElementById("btnNext").textContent="Enviar encomenda";
  document.getElementById("btnNext").className="btn green";
  document.getElementById("btnNext").onclick=enviar;
  window.scrollTo(0,0);
}
function uuid(){
  if(window.crypto&&crypto.randomUUID){try{return crypto.randomUUID()}catch(e){}}
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,function(c){
    var r=Math.random()*16|0, v=c==='x'?r:(r&0x3|0x8);return v.toString(16);
  });
}
async function enviar(){
  const nome=document.getElementById("fNome").value.trim();
  if(!nome){alert("Informe seu nome");return;}
  const btn=document.getElementById("btnNext");btn.disabled=true;btn.textContent="Enviando…";
  try{
    const encId=uuid();
    const {error}=await sb.from("encomendas").insert({
      id:encId,owner_id:LOJA.owner_id,cliente_nome:nome,
      telefone:document.getElementById("fTel").value,whatsapp:document.getElementById("fZap").value,
      endereco:document.getElementById("fEnd").value,data_desejada:document.getElementById("fData").value||null,
      observacoes:document.getElementById("fObs").value,total:total(),status:"recebido"
    });
    if(error) throw error;
    const itens=Object.entries(CART).map(([id,c])=>({encomenda_id:encId,produto_id:id,produto_nome:c.nome,quantidade:c.qtd,preco_unitario:c.preco}));
    const {error:errItens}=await sb.from("encomenda_itens").insert(itens);
    if(errItens) throw errItens;
    document.getElementById("bar").style.display="none";
    document.getElementById("wrap").innerHTML=`<div class="msg"><div class="big">🎉</div><h2>Encomenda enviada!</h2>
      <p style="color:var(--soft);margin-top:8px">Obrigada, ${nome}! A ${LOJA.nome} recebeu seu pedido de ${money(total())} e vai confirmar com você.</p>
      <button class="btn" style="margin-top:22px;max-width:280px" onclick="novoPedido()">Fazer novo pedido</button>
      ${LOJA.whatsapp?`<div><a href="https://wa.me/${LOJA.whatsapp.replace(/\D/g,"")}" style="display:inline-block;margin-top:16px;color:var(--green);font-weight:700">💬 Falar no WhatsApp</a></div>`:""}</div>`;
  }catch(e){
    const msg=(e&&(e.message||e.hint||e.details))||"Verifique sua internet e tente de novo.";
    alert("Não consegui enviar a encomenda.\n\nDetalhe: "+msg);
    btn.disabled=false;btn.textContent="Enviar encomenda";
  }
}
function novoPedido(){CART={};render();window.scrollTo(0,0);}
window.novoPedido=novoPedido;
let _avalProd=null,_avalNota=0;
function abrirAval(pid,nota){
  _avalProd=pid;_avalNota=nota;
  const p=PRODUTOS.find(x=>x.id===pid);
  const w=document.createElement("div");w.className="rovl";w.id="rovl";
  w.onclick=e=>{if(e.target===w)fecharAval();};
  w.innerHTML=`<div class="rmod">
    <h3>Avaliar ${p.nome}</h3>
    <p style="color:var(--soft);font-size:.85rem">Toque nas estrelas para dar sua nota</p>
    <div class="bigstars" id="bigstars">${bigStars(nota)}</div>
    <div class="field"><label>Comentário (opcional)</label><textarea id="avComent" placeholder="O que você achou do produto?"></textarea></div>
    <div class="field"><label>Seu nome (opcional)</label><input id="avNome"></div>
    <button class="btn green" style="width:100%" onclick="enviarAval()">Enviar avaliação</button>
    <button class="btn" style="width:100%;margin-top:8px;background:#EFE7DA;color:var(--ink)" onclick="fecharAval()">Cancelar</button>
  </div>`;
  document.body.appendChild(w);
}
function bigStars(n){let h="";for(let i=1;i<=5;i++)h+=`<span onclick="setAvalNota(${i})">${i<=n?"★":"☆"}</span>`;return h;}
function setAvalNota(n){_avalNota=n;document.getElementById("bigstars").innerHTML=bigStars(n);}
function fecharAval(){const e=document.getElementById("rovl");if(e)e.remove();}
async function enviarAval(){
  if(!_avalNota)return alert("Escolha de 1 a 5 estrelas");
  const ins={owner_id:LOJA.owner_id,produto_id:_avalProd,nota:_avalNota,
    comentario:document.getElementById("avComent").value,cliente_nome:document.getElementById("avNome").value};
  const {error}=await sb.from("avaliacoes").insert(ins);
  if(error){alert("Erro ao enviar: "+error.message);return;}
  AVS.push(ins);AVG=computeAvg(AVS);RATED[_avalProd]=_avalNota;saveRated();
  fecharAval();render();
}
window.abrirAval=abrirAval;window.setAvalNota=setAvalNota;window.fecharAval=fecharAval;window.enviarAval=enviarAval;
window.chg=chg;window.irCheckout=irCheckout;
init();
</script>
</body>
</html>
